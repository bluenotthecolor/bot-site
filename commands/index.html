<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Commands • Lana Bot</title>

    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/commands.css" />
    <link rel="stylesheet" href="../css/footer.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../js/supabase.js" defer></script>
    <script src="../js/app.js" defer></script>
    <script src="../js/commands.js" defer></script>
  </head>

  <body>
    <header>
      <div class="container navbar">
        <a href="/bot-site/" class="logo">Lana Bot</a>

        <nav class="desktop-nav">
          <a href="../">Home</a>
          <a href="./">Commands</a>
          <a href="../support/">Support</a>
        </nav>

        <div class="desktop-buttons">
          <a
            href="https://github.com/bluenotthecolor"
            class="secondary-btn"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub
          </a>

          <a
            href="https://discord.com/oauth2/authorize?client_id=1518226820330291346"
            class="primary-btn"
            target="_blank"
            rel="noopener noreferrer"
          >
            Invite
          </a>
        </div>

        <button class="menu-btn" id="menuBtn">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 7H20"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />

            <path
              d="M4 12H20"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />

            <path
              d="M4 17H20"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="overlay" id="overlay"></div>

    <aside class="mobile-menu" id="mobileMenu">
      <div class="mobile-header">
        <h2>Lana Bot</h2>

        <button id="closeBtn">✕</button>
      </div>

      <nav class="mobile-nav">
        <a href="../">Home</a>
        <a href="./">Commands</a>
        <a href="../support/">Support</a>

        <a
          href="https://github.com/bluenotthecolor"
          target="_blank"
          rel="noopener noreferrer"
        >
          GitHub
        </a>
      </nav>

      <div class="mobile-bottom">
        <a
          href="https://discord.com/oauth2/authorize?client_id=1518226820330291346"
          class="primary-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          Invite Bot
        </a>
      </div>
    </aside>

    <main>
      <section class="commands-hero">
        <div class="container">
          <span class="badge"> Commands </span>

          <h1>Everything <span class="highlight">Lana Bot</span> Can Do</h1>

          <p>Browse every command, search instantly, and filter by category.</p>

          <div class="search-wrapper">
            <input
              type="text"
              id="commandSearch"
              placeholder="Search commands..."
            />
          </div>
        </div>
      </section>

      <section class="category-section">
        <div class="container">
          <div class="category-list">
            <button class="category active" data-category="all">All</button>

            <button class="category" data-category="Moderation">
              Moderation
            </button>

            <button class="category" data-category="Utility">Utility</button>

            <button class="category" data-category="Fun">Fun</button>
          </div>
        </div>
      </section>

      <section class="commands-page">
        <div class="container">
          <div class="commands-grid" id="commandsGrid">
            <!-- Commands will be inserted here -->
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>© 2026 Lana Bot. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
