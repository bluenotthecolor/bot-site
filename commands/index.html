<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commands — Lana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/commands.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../index.html">
        <span class="brand-mark">L</span>
        <span class="brand-name">Lana</span>
      </a>
      <nav class="top-nav">
        <a href="index.html" class="active">Commands</a>
        <a href="../support/index.html">Support</a>
        <a href="../dashboard/index.html">Dashboard</a>
      </nav>
    </header>

    <main>
      <div class="commands-header">
        <h1>Every command, in one place.</h1>
        <p>
          You can find any command here, if you still need help, join our
          support server.
        </p>
        <p class="commands-meta" id="commands-meta"></p>
      </div>

      <div class="commands-controls">
        <div class="search-field">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search commands…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="category-pills" id="category-pills"></div>
      </div>

      <div class="commands-body" id="commands-body"></div>
    </main>

    <script src="../js/commands.js"></script>
  </body>
</html>
