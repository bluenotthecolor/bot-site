<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lana Bot</title>

    <meta
      name="description"
      content="Lana Bot is a modern Discord bot featuring moderation, utility, logging and more."
    />

    <!-- Primary Meta -->
    <title>Lana Bot</title>
    <meta
      name="description"
      content="A powerful Discord bot with moderation, fun, utility, and more."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Lana Bot - Discord Bot" />
    <meta
      property="og:description"
      content="A powerful Discord bot with moderation, fun, utility, and more."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://bluenotthecolor.github.io/bot-site/"
    />
    <meta
      property="og:image"
      content="https://bluenotthecolor.github.io/bot-site/assets/images/banner.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / Discord -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lana Bot - Discord Bot" />
    <meta
      name="twitter:description"
      content="A powerful Discord bot with moderation, fun, utility, and more."
    />
    <meta
      name="twitter:image"
      content="https://bluenotthecolor.github.io/bot-site/assets/images/banner.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#5865F2" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/hero.png" />

    <link rel="icon" href="favicon.ico" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <!-- JS -->
    <script defer src="js/app.js"></script>
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->

    <header>
      <div class="container navbar">
        <a href="/bot-site/" class="logo">Lana Bot</a>

        <nav class="desktop-nav">
          <a href="./">Home</a>
          <a href="./commands/">Commands</a>
          <a href="./support/">Support</a>
        </nav>

        <div class="desktop-buttons">
          <a href="https://github.com/bluenotthecolor" class="secondary-btn"
            >GitHub</a
          >
          <a
            href="https://discord.com/oauth2/authorize?client_id=1518226820330291346"
            class="primary-btn"
            >Invite</a
          >
        </div>

        <button class="menu-btn" id="menuBtn">☰</button>
      </div>
    </header>

    <div class="overlay" id="overlay"></div>

    <aside class="mobile-menu" id="mobileMenu">
      <div class="mobile-header">
        <h2>Lana Bot</h2>
        <button id="closeBtn">✕</button>
      </div>

      <nav class="mobile-nav">
        <a href="./">Home</a>
        <a href="./commands/">Commands</a>
        <a href="./support/">Support</a>

        <a href="https://github.com/yourusername/lanabot" target="_blank">
          GitHub
        </a>
      </nav>

      <div class="mobile-bottom">
        <a
          href="https://discord.com/oauth2/authorize?client_id=1518226820330291346"
          class="primary-btn"
          >Invite Bot</a
        >
      </div>
    </aside>

    <!-- ================= HERO ================= -->

    <main>
      <section class="hero">
        <div class="container hero-grid">
          <div>
            <span class="badge">Lana Bot </span>

            <h1>
              Powerful <span class="highlight">moderation</span><br />
              made beautiful.
            </h1>

            <p>
              The modern Discord bot for moderation, utility, logging and much
              more.
            </p>

            <div class="hero-buttons">
              <a
                href="https://discord.com/oauth2/authorize?client_id=1518226820330291346"
                class="primary-btn"
                >Invite Bot</a
              >

              <a href="./commands/" class="secondary-btn"> Commands </a>
            </div>
          </div>

          <div class="hero-image">
            <img src="assets/images/hero.png" alt="Hero" />
          </div>
        </div>
      </section>
    </main>

    <!-- ================= FOOTER ================= -->

    <footer>
      <div class="container">© 2026 Lana Bot</div>
    </footer>
  </body>
</html>
