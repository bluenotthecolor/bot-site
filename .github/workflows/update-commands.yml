name: Update commands.json

# Runs whenever a cog changes on main, regenerates data/commands.json from
# the current cogs, and commits it if anything changed. This is what makes
# the commands page "auto-update" - the site is static (GitHub Pages), so
# this commit-back step is what stands in for a live backend.
on:
  push:
    branches: [main]
    paths:
      - "cogs/**.py"
      - "scripts/generate_commands.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate data/commands.json
        run: python scripts/generate_commands.py cogs data/commands.json

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- data/commands.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/commands.json
            git commit -m "chore: regenerate commands.json"
            git push
          else
            echo "No command changes detected."
          fi
